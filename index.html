<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5">
<title>홍콩 3일 (6/25–6/27) · 지도 + 날씨별 루트</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<style>
  :root{
    --ink:#0b1020; --ink2:#0f1730; --panel:#121a2e; --line:#23304e;
    --text:#e9eefb; --muted:#9aa7c4; --muted2:#74819f;
    --d1:#8b95a7; --d2:#ff9e3d; --d2line:#f08322; --d3:#22d3ee; --d3line:#12b6cd;
    --sun:#ffb703; --rain:#4ea8de; --off:#5f6b82;
    --r:14px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR","Malgun Gothic",system-ui,sans-serif;
    background:var(--ink); color:var(--text); overflow:hidden;
  }
  .wrap{display:flex; flex-direction:column; height:100vh; height:100dvh}

  /* Header */
  header{
    background:linear-gradient(180deg,#0e1530,#0b1020);
    border-bottom:1px solid var(--line);
    padding:10px 14px; flex:0 0 auto; z-index:1200;
  }
  .titlerow{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
  .titlerow h1{font-size:17px; margin:0; letter-spacing:-.02em; font-weight:800}
  .titlerow .sub{font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums}
  .controls{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center}
  
  .seg{display:inline-flex; background:#0a0f22; border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px}
  .seg button{
    appearance:none; border:0; background:transparent; color:var(--muted);
    font:inherit; font-size:12.5px; font-weight:700; padding:6px 11px; border-radius:999px; cursor:pointer;
    white-space:nowrap; transition:background .15s,color .15s;
  }
  .seg button:hover{color:var(--text)}
  .seg button[aria-pressed="true"]{color:#0b1020; background:var(--text)}
  .seg.day button[aria-pressed="true"][data-day="2"]{background:var(--d2); color:#3a1c00}
  .seg.day button[aria-pressed="true"][data-day="3"]{background:var(--d3); color:#053038}
  .seg.day button[aria-pressed="true"][data-day="1"]{background:var(--d1); color:#10131c}
  .seg.wx button{font-size:14px; padding:6px 13px}
  .seg.wx button[aria-pressed="true"][data-wx="sun"]{background:var(--sun); color:#3a2a00}
  .seg.wx button[aria-pressed="true"][data-wx="rain"]{background:var(--rain); color:#03233a}
  .wxhint{font-size:11px; color:var(--muted2)}
  
  /* Buttons */
  .action-btns{ display:flex; gap:6px; margin-left:auto }
  .btn-add{
    background:var(--d3); color:#053038; border:none; padding:6px 12px; font-size:12px;
    font-weight:800; border-radius:999px; cursor:pointer;
    transition: background 0.2s; white-space:nowrap;
  }
  .btn-add:hover{ background:#47e2f5; }
  .btn-add.search{ background:var(--sun); color:#3a2a00; }
  .btn-add.search:hover{ background:#ffc933; }

  /* Body split */
  .body{display:flex; flex:1 1 auto; min-height:0}
  #map{flex:1 1 auto; min-width:0; min-height:300px; background:#0a0f1d}
  .leaflet-container{background:#0a0f1d}

  aside{
    flex:0 0 360px; max-width:42vw; background:var(--ink2); border-left:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0;
  }
  .tabs{display:flex; border-bottom:1px solid var(--line); flex:0 0 auto}
  .tabs button{
    flex:1; appearance:none; border:0; background:transparent; color:var(--muted);
    font:inherit; font-weight:700; font-size:12px; padding:12px 2px; cursor:pointer; position:relative;
  }
  .tabs button[aria-selected="true"]{color:var(--text)}
  .tabs button[aria-selected="true"]::after{
    content:""; position:absolute; left:18%; right:18%; bottom:-1px; height:2px; background:var(--text); border-radius:2px;
  }
  .panel{overflow:auto; padding:14px 14px 28px; flex:1 1 auto}
  .panel::-webkit-scrollbar{width:9px}
  .panel::-webkit-scrollbar-thumb{background:#27324d; border-radius:9px}

  .planhead{display:flex; align-items:center; gap:9px; margin:2px 0 12px}
  .chip{font-size:11.5px; font-weight:800; padding:4px 9px; border-radius:999px}
  .chip.d2{background:rgba(255,158,61,.16); color:var(--d2); border:1px solid rgba(255,158,61,.4)}
  .chip.d3{background:rgba(34,211,238,.14); color:var(--d3); border:1px solid rgba(34,211,238,.4)}
  .chip.d1{background:rgba(139,149,167,.16); color:#c4cbdb; border:1px solid rgba(139,149,167,.4)}
  .chip.wx{background:#0a0f22; border:1px solid var(--line); color:var(--text)}

  ol.timeline{list-style:none; margin:0; padding:0; position:relative}
  ol.timeline::before{content:""; position:absolute; left:13px; top:6px; bottom:14px; width:2px; background:var(--line)}
  ol.timeline li{position:relative; padding:0 0 14px 38px; cursor:pointer}
  ol.timeline li .dot{position:absolute; left:5px; top:3px; width:18px; height:18px; border-radius:50%;
    background:var(--ink2); border:2px solid var(--muted); display:grid; place-items:center; font-size:9px; font-weight:800; color:var(--muted); z-index:1}
  .d2 ol.timeline li .dot{border-color:var(--d2); color:var(--d2)}
  .d3 ol.timeline li .dot{border-color:var(--d3); color:var(--d3)}
  ol.timeline li:hover .tl-title{text-decoration:underline}
  .tl-time{font-size:11.5px; font-weight:800; color:var(--muted); font-variant-numeric:tabular-nums}
  .tl-title{font-size:14px; font-weight:700; margin:1px 0 2px}
  .tl-desc{font-size:12.5px; color:var(--muted); line-height:1.5}
  .tl-desc b{color:#ffd9a8}
  .d3 .tl-desc b{color:#a9eef6}

  /* Cautions & Category List */
  .cau-sec{margin:6px 0 16px}
  .cau-sec h3{font-size:13px; letter-spacing:.02em; color:var(--text); margin:0 0 8px; font-weight:800}
  .cau-sec h3 .tagd2{color:var(--d2)} .cau-sec h3 .tagd3{color:var(--d3)}
  ol.cau{margin:0; padding:0; counter-reset:c; list-style:none}
  ol.cau li{position:relative; padding:0 0 11px 30px; font-size:12.8px; line-height:1.55; color:var(--text)}
  ol.cau li::before{counter-increment:c; content:counter(c); position:absolute; left:0; top:0;
    width:20px; height:20px; border-radius:50%; background:#0a0f22; border:1px solid var(--line);
    color:var(--muted); font-size:11px; font-weight:800; display:grid; place-items:center}
  ol.cau li.warn::before{background:#3a1414; border-color:#7a2d2d; color:#ff9b9b}
  ol.cau li .k{color:#ffd9a8; font-weight:700}
  ol.cau li.warn .k{color:#ff9b9b}

  /* Legend */
  .leg h3{font-size:12px; letter-spacing:.04em; text-transform:uppercase; color:var(--muted2); margin:14px 0 8px; font-weight:800}
  .leg .row{display:flex; align-items:center; gap:9px; font-size:12.8px; padding:3px 0; color:var(--text)}
  .swatch{width:26px; height:0; border-top-width:4px; border-top-style:solid; border-radius:3px; flex:0 0 26px}
  .ldot{width:18px; height:18px; border-radius:50%; display:grid; place-items:center; font-size:10px; flex:0 0 18px}
  .leg small{color:var(--muted)}

  /* Marker icon */
  .mk{width:28px; height:28px; border-radius:50% 50% 50% 2px; transform:rotate(45deg);
    border:2px solid rgba(255,255,255,.85); box-shadow:0 2px 6px rgba(0,0,0,.5); display:grid; place-items:center}
  .mk span{transform:rotate(-45deg); font-size:14px; line-height:1}
  .mk.off{border-style:dashed; opacity:.92}
  .mk.add{border-color:#cdd6ea}
  .dotmk{width:13px; height:13px; border-radius:50%; border:1.5px solid rgba(255,255,255,.72); box-shadow:0 1px 3px rgba(0,0,0,.5)}
  .dotmk.off{border-style:dashed; opacity:.8}
  .numbubble{width:16px; height:16px; border-radius:50%; border:1.5px solid #fff; color:#0b1020; font-size:10.5px; font-weight:800; display:grid; place-items:center; box-shadow:0 1px 3px rgba(0,0,0,.55)}
  .tilemsg{max-width:240px; background:#3a1414; border:1px solid #7a2d2d; color:#ffd0d0; font-size:11px; line-height:1.45; padding:7px 9px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.5)}
  
  /* Popup Overrides */
  .leaflet-popup-content-wrapper{background:#0e1530; color:var(--text); border:1px solid var(--line); border-radius:12px}
  .leaflet-popup-tip{background:#0e1530; border:1px solid var(--line)}
  .leaflet-popup-content{margin:11px 13px; font-size:13px; line-height:1.5}
  .leaflet-popup-content b{font-size:14px; color:#fff}
  .pop-en{color:var(--muted); font-size:11.5px}
  .pop-note{display:block; margin-top:5px; color:#c7d0e6; font-size:12px}
  .pop-cat{display:inline-block; margin-top:6px; font-size:10.5px; font-weight:800; padding:2px 7px; border-radius:999px; background:#0a0f22; border:1px solid var(--line); color:var(--muted)}
  a.leaflet-popup-close-button{color:var(--muted)!important}

  /* Geocoder (Search Bar) Dark Mode Styling */
  .leaflet-control-geocoder { background:#0e1530 !important; color:var(--text) !important; border:1px solid var(--line) !important; border-radius:6px; }
  .leaflet-control-geocoder-icon { border-radius:6px; background-color:transparent !important; filter:invert(1) opacity(0.8); }
  .leaflet-control-geocoder-expanded .leaflet-control-geocoder-icon { background-color: transparent !important; }
  .leaflet-control-geocoder-form input { color:var(--text) !important; background:transparent !important; font-family:inherit; }
  .leaflet-control-geocoder-alternatives { background:#0e1530 !important; border:1px solid var(--line) !important; border-top:none !important; border-radius:0 0 6px 6px; }
  .leaflet-control-geocoder-alternatives li { color:var(--text) !important; }
  .leaflet-control-geocoder-alternatives li:hover { background-color:#1a2542 !important; }

  /* ====================================================
     📱 모바일 반응형 최적화 
     (화면 높이 확보를 위해 상단 헤더 압축 및 지도 높이 조절)
     ==================================================== */
  @media (max-width:760px){
    .body{flex-direction:column}
    
    /* 지도 비율을 확대 (요청 반영: 55vh로 큼직하게 표시) */
    #map{flex:0 0 55vh; height:55vh; min-height:300px}
    aside{flex:1 1 auto; max-width:none; border-left:0; border-top:1px solid var(--line)}
    
    /* 헤더 패딩 및 줄간격 축소 */
    header { padding: 8px 10px; }
    .titlerow { gap: 6px; flex-wrap: nowrap; }
    .titlerow h1{font-size:15px; white-space:nowrap;}
    
    /* 공간 절약을 위해 보조 텍스트 숨김 처리 */
    .titlerow .sub { display: none; }
    .wxhint { display: none; }
    
    /* 버튼 사이즈 축소 및 우측 정렬 */
    .action-btns { margin-left: auto; gap: 4px; flex-shrink: 0; }
    .btn-add { padding: 5px 8px; font-size: 11px; }
    
    /* 날짜/날씨 컨트롤 한 줄에 컴팩트하게 배치 */
    .controls { margin-top: 6px; gap: 4px; justify-content: flex-start; }
    .seg button { font-size: 11px; padding: 4px 7px; letter-spacing: -0.3px; }
    .seg.wx button { font-size: 11px; padding: 4px 7px; }
    
    /* 하단 탭 글씨 크기 약간 축소 */
    .tabs button { font-size: 11.5px; padding: 10px 2px; }
  }
</style>
</head>
<body>

      <div class="action-btns">
        <button id="btn-search-add" class="btn-add search">🔍 검색 추가</button>
        <button id="btn-add-spot" class="btn-add">➕ 지도 클릭</button>
      </div>
    </div>
    <div class="controls">
      <div class="seg day" role="group" aria-label="날짜 선택">
        <button data-day="all" aria-pressed="false">전체</button>
        <button data-day="1" aria-pressed="false">1일·도착</button>
        <button data-day="2" aria-pressed="true">2일·홍콩섬</button>

    </div>
  </header>

  <div class="body">
    <div id="map"></div>
    <aside>
      <div class="tabs" role="tablist">
        <button id="tab-plan" role="tab" aria-selected="true">일정</button>
        <button id="tab-cat" role="tab" aria-selected="false">맛집·카페·장소</button>
        <button id="tab-cau" role="tab" aria-selected="false">주의사항</button>

      </div>
      <div class="panel" id="panel-plan"></div>
      <div class="panel" id="panel-cat" hidden></div>
      <div class="panel" id="panel-cau" hidden></div>
      <div class="panel" id="panel-leg" hidden></div>
    </aside>
  </div>
</div>

/* ---------- Map ---------- */
const map = L.map("map",{zoomControl:true,scrollWheelZoom:true}).setView([22.305,114.165],12.4);

// 주소 검색 컨트롤 바인딩 (Leaflet Control Geocoder)
const geocoder = L.Control.geocoder({
  defaultMarkGeocode: false,
  placeholder: "지도 내 주소 검색...",
  position: "topleft"
}).addTo(map);

let searchTempMarker = null;

geocoder.on('markgeocode', function(e) {
  const latlng = e.geocode.center;
  const placeName = e.geocode.name.split(',')[0]; 
  if(searchTempMarker) map.removeLayer(searchTempMarker);
  
  map.flyTo(latlng, 16);
  searchTempMarker = L.marker(latlng).addTo(map);
  
  const popupHtml = `
    <div style="font-size:14px; font-weight:bold; margin-bottom:4px; color:#fff">${placeName}</div>
    <div style="font-size:11px; color:var(--muted); margin-bottom:10px">${e.geocode.name}</div>
    <button id="btn-confirm-search-add" style="background:var(--d3); color:#053038; border:none; padding:6px; width:100%; border-radius:4px; cursor:pointer; font-weight:800;">이 위치 내 일정에 추가</button>
  `;
  searchTempMarker.bindPopup(popupHtml).openPopup();

  searchTempMarker.on('popupopen', () => {
    const btn = document.getElementById("btn-confirm-search-add");
    if(btn) {
      btn.addEventListener('click', () => {
        map.closePopup();
        if(searchTempMarker) map.removeLayer(searchTempMarker);
        promptToAddPlace(latlng.lat, latlng.lng, placeName);
      });
    }
  });
});

const tileMsg=L.control({position:"bottomleft"});
tileMsg.onAdd=function(){
  const d=L.DomUtil.create("div","tilemsg");
  d.style.display="none";
  d.innerHTML="⚠️ 미리보기에서 지도 타일이 차단되었습니다. 파일을 <b>다운로드해 브라우저로 열면</b> 표시됩니다.";
  return d;
};
tileMsg.addTo(map);

const TILE_PROVIDERS=[
  {url:"https://{s}.basemap.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png",opt:{subdomains:"abcd",maxZoom:20,detectRetina:true,attribution:"© OpenStreetMap © CARTO"}},
  {url:"https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}",opt:{maxZoom:19,detectRetina:true,attribution:"© Esri"}},
  {url:"https://maps.wikimedia.org/osm-intl/{z}/{x}/{y}.png",opt:{maxZoom:18,detectRetina:true,attribution:"© OpenStreetMap"}}
];
let _pIdx=0,_curTiles=null,_pErr=false;
function useProvider(i){
  _pErr=false;
  if(_curTiles) map.removeLayer(_curTiles);
  const p=TILE_PROVIDERS[i];
  _curTiles=L.tileLayer(p.url,p.opt);
  _curTiles.on("tileerror",function(){
    if(_pErr) return; _pErr=true;
    if(_pIdx<TILE_PROVIDERS.length-1){ _pIdx++; useProvider(_pIdx); }
    else { const d=document.querySelector(".tilemsg"); if(d) d.style.display="block"; }
  });
  _curTiles.addTo(map);
}
useProvider(0);

function fixMapSize(){ try{ map.invalidateSize(false); }catch(e){} }
setTimeout(fixMapSize,150); window.addEventListener("resize",fixMapSize);

const cssVar = n => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
function dayColor(d){return d===2?cssVar("--d2"):d===3?cssVar("--d3"):cssVar("--d1");}

function smallIcon(s){
  const bg=s.off?cssVar("--off"):dayColor(s.day);
  return L.divIcon({className:"",html:`<div class="dotmk ${s.off?'off':''}" style="background:${bg}"></div>`,iconSize:[13,13],iconAnchor:[7,7],popupAnchor:[0,-8]});
}
function pinIcon(s){
  const bg=dayColor(s.day);
  const cls="mk"+(s.add?" add":"");
  return L.divIcon({className:"",html:`<div class="${cls}" style="background:${bg}"><span>${CAT[s.cat]?.e||'📍'}</span></div>`,iconSize:[28,28],iconAnchor:[14,26],popupAnchor:[0,-24]});
}
function numBadge(s,n){
  return L.divIcon({className:"",html:`<div class="numbubble" style="background:${dayColor(s.day)}">${n}</div>`,iconSize:[16,16],iconAnchor:[-1,30]});
}
function popupHTML(s){
  const cat = CAT[s.cat] || {e:'📍', l:'기타 장소'};
  return `<b>${s.ko}</b><br><span class="pop-en">${s.en||''}</span>`+
         `<span class="pop-note">${s.note||''}</span>`+
         `<span class="pop-cat">${cat.e} ${cat.l}</span>`;
}

const markers={};
const markerLayer=L.layerGroup().addTo(map);
const routeLayer=L.layerGroup().addTo(map);
const labelLayer=L.layerGroup().addTo(map);

let day="2", wx="sun";

function activePlan(){
  const p=PLANS[day]; return p? (p.both||p[wx]) : null;
}
function drawMarkers(){
  markerLayer.clearLayers(); labelLayer.clearLayers();
  const plan=activePlan();
  const routeIds = plan ? plan.stops.filter(x=>x.id&&SMAP[x.id]).map(x=>x.id) : [];
  const routeSet = new Set(routeIds);
  SPOTS.forEach(s=>{
    const belongs = (day==="all") || (String(s.day)===day);
    if(!belongs) return;
    const onRoute = routeSet.has(s.id);
    const m=L.marker([s.lat,s.lng],{
      icon: onRoute?pinIcon(s):smallIcon(s),
      title:s.ko, zIndexOffset:onRoute?400:100, riseOnHover:true
    }).bindPopup(popupHTML(s));
    markerLayer.addLayer(m);
    markers[s.id]=m;
  });
  routeIds.forEach((id,i)=>{
    labelLayer.addLayer(L.marker([SMAP[id].lat,SMAP[id].lng],
      {icon:numBadge(SMAP[id],i+1), zIndexOffset:700, interactive:false}));
  });
}
function renderMap(){
  routeLayer.clearLayers(); drawMarkers();
  const plan=activePlan();
  if(!plan){
    map.flyToBounds(L.latLngBounds(SPOTS.filter(s=>!s.off).map(s=>[s.lat,s.lng])),{padding:[40,40],duration:.6});
    return;
  }
  const lineIds=plan.stops.filter(x=>x.id&&SMAP[x.id]).map(x=>x.id);
  const latlngs=lineIds.map(id=>[SMAP[id].lat,SMAP[id].lng]);
  if(latlngs.length>1){
    L.polyline(latlngs,{color:dayColor(SMAP[lineIds[0]].day),weight:4,opacity:.9,
      dashArray: wx==="rain"?"2 9":null, lineCap:"round", lineJoin:"round"}).addTo(routeLayer);
  }
  if(latlngs.length){
    map.flyToBounds(L.latLngBounds(latlngs.length>1?latlngs:[latlngs[0],latlngs[0]]),{padding:[60,60],maxZoom:15,duration:.6});
  }
}

function renderPlan(){
  const el=document.getElementById("panel-plan");
  const plan=activePlan();
  const dc = day==="2"?"d2":day==="3"?"d3":"d1";
  if(!plan){
    el.innerHTML=`<div class="planhead"><span class="chip ${dc}">전체 스폿</span></div>
      <p class="tl-desc">날짜 탭을 누르면 루트가 표시됩니다. 마커를 누르면 상세정보가 나옵니다.</p>`;
    return;
  }
  let h=`<div class="planhead"><span class="chip ${dc}">일정</span></div><ol class="timeline ${dc}">`;
  plan.stops.forEach((s,i)=>{
    const clickable = s.id&&markers[s.id];
    h+=`<li ${clickable?`data-go="${s.id}"`:"data-go=\"\""}>
      <span class="dot">${i+1}</span><div class="tl-time">${s.t}</div>
      <div class="tl-title">${s.title}</div><div class="tl-desc">${s.desc}</div></li>`;
  });
  h+=`</ol>`; el.innerHTML=h;
  bindListClicks(el);
}

function renderCategoryList() {
  const el = document.getElementById("panel-cat");
  const groups = {
    "🍜 맛집 (Food)": SPOTS.filter(s => s.cat === "food"),
    "🥐 카페·디저트 (Cafe)": SPOTS.filter(s => s.cat === "sweet"),
    "🍸 바·주점 (Bar)": SPOTS.filter(s => s.cat === "bar"),
    "📸 갈만한 곳 (Places)": SPOTS.filter(s => !["food", "sweet", "bar"].includes(s.cat))
  };

  let h = `<div class="cau-sec"><p class="tl-desc" style="margin-top:0">장소를 클릭하면 지도가 이동합니다. 숨겨진 날짜의 장소일 경우 자동으로 '전체' 보기로 전환됩니다.</p>`;
  for (const [title, spots] of Object.entries(groups)) {
    if(spots.length === 0) continue;
    h += `<h3 style="margin-top:20px">${title}</h3><ol class="timeline d1">`;
    spots.forEach(s => {
      h += `<li data-go="${s.id}">
              <div class="tl-title" style="margin-bottom:4px">${s.ko} 
                <span style="font-size:11px; font-weight:normal; color:var(--muted); border:1px solid var(--line); border-radius:4px; padding:1px 4px; margin-left:4px">
                  Day ${s.day === "all" ? "전체" : s.day}
                </span>
              </div>
              <div class="tl-desc" style="font-size:11.5px">${s.note}</div>
            </li>`;
    });
    h += `</ol>`;
  }
  h += `</div>`;
  el.innerHTML = h;
  bindListClicks(el);
}

function bindListClicks(el) {
  el.querySelectorAll("li[data-go]").forEach(li => {
    li.addEventListener("click", () => {
      const id = li.getAttribute("data-go");
      if(!id) return;
      if (!markers[id]) {
          document.querySelector('[data-day="all"]').click();
      }
      setTimeout(() => {
          const m = markers[id];
          if(m) {
              map.flyTo([SMAP[id].lat, SMAP[id].lng], 16, {duration: .6});
              m.openPopup();
          }
      }, 50);
    });
  });
}

// ----------------------------------------------------
// 원본 주의사항 (Cautions) 함수 복원
// ----------------------------------------------------
function renderCautions(){
  const el=document.getElementById("panel-cau");
  let h="";
  CAUTIONS.forEach(sec=>{
    const tag = sec.d===2?'<span class="tagd2">●</span> ':sec.d===3?'<span class="tagd3">●</span> ':'';
    h+=`<div class="cau-sec"><h3>${tag}${sec.title}</h3><ol class="cau">`;
    sec.items.forEach(it=>{
      h+=`<li class="${it.warn?'warn':''}"><span class="k">${it.k}</span>${it.t}</li>`;
    });
    h+=`</ol></div>`;
  });
  el.innerHTML=h;
}

// ----------------------------------------------------
// 원본 범례 (Legend) 함수 복원
// ----------------------------------------------------
function renderLegend(){
  const el=document.getElementById("panel-leg");
  let h=`<div class="leg"><h3>날짜별 경로</h3>`;
  h+=`<div class="row"><span class="swatch" style="border-top-color:${cssVar('--d2')}"></span><b>2일 · 홍콩섬</b></div>`;
  h+=`<div class="row"><span class="swatch" style="border-top-color:${cssVar('--d3')}"></span><b>3일 · 구룡</b></div>`;
  h+=`<div class="row"><span class="swatch" style="border-top-color:${cssVar('--d1')}"></span><b>1일 · 도착</b></div>`;
  h+=`<h3>날씨 (선 모양)</h3>`;
  h+=`<div class="row"><span class="swatch" style="border-top-color:#fff;border-top-style:solid"></span><small>실선 = ☀️ 맑음 루트</small></div>`;
  h+=`<div class="row"><span class="swatch" style="border-top-color:#fff;border-top-style:dotted;border-top-width:4px"></span><small>점선 = ☁️ 비·흐림 루트</small></div>`;
  h+=`<h3>마커 종류</h3>`;
  Object.entries(CAT).forEach(([k,v])=>{
    h+=`<div class="row"><span class="ldot" style="background:#2a3656">${v.e}</span><small>${v.l}</small></div>`;
  });
  h+=`<h3>마커 색·테두리</h3>`;
  h+=`<div class="row"><span class="ldot" style="background:${cssVar('--d2')}"></span><small>2일 스폿(주황) / 3일 스폿(청록)</small></div>`;
  h+=`<div class="row"><span class="ldot" style="background:#cdd6ea;color:#111">＋</span><small>＋추천 = 동선 주변 추가 제안(실내/우천 대체 등)</small></div>`;
  h+=`<div class="row"><span class="ldot off" style="background:${cssVar('--off')};border:2px dashed #fff">·</span><small>회색 점선 = 동선 밖(참고용)</small></div>`;
  h+=`<h3>마커 크기</h3>`;
  h+=`<div class="row"><span class="ldot" style="background:${cssVar('--d2')};width:24px;height:24px;color:#0b1020;font-weight:800;font-size:11px">3</span><small>큰 핀 + 번호 = 그날 경로 지점(방문 순서)</small></div>`;
  h+=`<div class="row"><span class="ldot" style="background:${cssVar('--d2')};width:12px;height:12px"></span><small>작은 점 = 경로 외 대안·추천 스폿(클릭 시 정보)</small></div>`;
  h+=`<p class="tl-desc" style="margin-top:12px">일정 탭에서 항목을 누르면 지도가 해당 위치로 이동합니다. 선택한 날짜 외 스폿은 숨겨집니다.</p></div>`;
  el.innerHTML=h;
}

/* ---------- User Interactions ---------- */
document.querySelectorAll(".seg.day button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".seg.day button").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true"); day=b.dataset.day; renderMap(); renderPlan();
  });
});
document.querySelectorAll(".seg.wx button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".seg.wx button").forEach(x=>x.setAttribute("aria-pressed","false"));
    b.setAttribute("aria-pressed","true"); wx=b.dataset.wx; renderMap(); renderPlan();
  });
});
const tabs=[["tab-plan","panel-plan"],["tab-cat","panel-cat"],["tab-cau","panel-cau"],["tab-leg","panel-leg"]];
tabs.forEach(([tid,pid])=>{
  document.getElementById(tid).addEventListener("click",()=>{
    tabs.forEach(([t,p])=>{
      const on=t===tid;
      document.getElementById(t).setAttribute("aria-selected",on);
      document.getElementById(p).hidden=!on;
    });
  });
});

/* ---------- Add Spot Feature (Search & Click) ---------- */
function promptToAddPlace(lat, lng, defaultName = "") {
  const ko = prompt("추가할 장소의 이름을 입력하세요:", defaultName);
  if(!ko) return;

  let catInput = prompt("분류를 영문으로 입력하세요\n(food:식당, sweet:카페/디저트, bar:주점, sight:명소, shop:상점 중 택 1)", "sight");
  if(!catInput || !CAT[catInput]) catInput = "sight";

  const dayInput = prompt("몇 일차 일정인가요? (1, 2, 3 중 입력. 모르면 all)", "all");
  const parsedDay = isNaN(parseInt(dayInput)) ? "all" : parseInt(dayInput);

  const newId = "custom_" + Date.now();
  const newSpot = {
    id: newId,
    ko: ko,
    en: "Custom Spot",
    lat: lat,
    lng: lng,
    cat: catInput,
    day: parsedDay,
    note: "직접 검색/클릭하여 추가한 맞춤 장소입니다.",
    off: true 
  };

  SPOTS.push(newSpot);
  SMAP[newId] = newSpot;

  renderMap();
  renderPlan();
  renderCategoryList();
  
  alert(`'${ko}' 장소가 성공적으로 추가되었습니다!`);
}

// 1. Search to Add
const btnSearchAdd = document.getElementById("btn-search-add");
btnSearchAdd.addEventListener("click", () => {
  const query = prompt("검색할 장소명이나 주소를 입력하세요\n(영문으로 검색하면 더 정확합니다. 예: Disneyland):");
  if (!query) return;

  btnSearchAdd.innerText = "⏳ 검색 중...";
  
  const searchUrl = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + ", Hong Kong")}&limit=5`;
  
  fetch(searchUrl)
    .then(res => res.json())
    .then(data => {
      btnSearchAdd.innerText = "🔍 검색 추가";
      if (data.length > 0) {
        const place = data[0];
        const lat = parseFloat(place.lat);
        const lng = parseFloat(place.lon);
        
        map.flyTo([lat, lng], 16);
        
        if(searchTempMarker) map.removeLayer(searchTempMarker);
        searchTempMarker = L.marker([lat, lng]).addTo(map);
        searchTempMarker.bindPopup(`<b>${place.name || query}</b><br>이 위치가 맞다면 추가를 진행해주세요.`).openPopup();
        
        setTimeout(() => {
          promptToAddPlace(lat, lng, place.name || query);
        }, 800);
      } else {
        alert("검색 결과를 찾을 수 없습니다. 영문명이나 더 정확한 주소로 다시 시도해보세요.");
      }
    })
    .catch(err => {
      btnSearchAdd.innerText = "🔍 검색 추가";
      alert("검색 중 오류가 발생했습니다.");
    });
});

// 2. Click Map to Add
let isAddingSpot = false;
const btnAdd = document.getElementById("btn-add-spot");

btnAdd.addEventListener("click", () => {
  isAddingSpot = !isAddingSpot;
  if(isAddingSpot) {
    btnAdd.style.background = "#ff9e3d";
    btnAdd.innerText = "📍 위치 클릭 (취소: 재클릭)";
    document.getElementById("map").style.cursor = "crosshair";
  } else {
    btnAdd.style.background = "var(--d3)";
    btnAdd.innerText = "➕ 지도 클릭";
    document.getElementById("map").style.cursor = "";
  }
});

map.on("click", (e) => {
  if(!isAddingSpot) return;
  promptToAddPlace(e.latlng.lat, e.latlng.lng);
  btnAdd.click(); // 추가 모드 해제
});

// Init
renderCautions(); renderLegend(); renderCategoryList(); renderMap(); renderPlan();
</script>
